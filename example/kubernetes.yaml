# Go-Trust Kubernetes Deployment Example
#
# Complete Kubernetes deployment for go-trust AuthZEN PDP server.

---
apiVersion: v1
kind: Namespace
metadata:
  name: go-trust

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: go-trust-certs
  namespace: go-trust
data:
  # In practice, you would populate this from a Secret or external source
  # Certificate bundle should be generated by tsl-tool
  trusted-certs.pem: |
    # Paste your PEM certificates here
    # Or mount from a Secret/PersistentVolume

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-trust
  namespace: go-trust
  labels:
    app: go-trust
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-trust
  template:
    metadata:
      labels:
        app: go-trust
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: go-trust
        image: sirosfoundation/go-trust:latest
        args:
        - --host=0.0.0.0
        - --port=6001
        - --etsi-cert-bundle=/config/trusted-certs.pem
        - --log-format=json
        - --log-level=info
        ports:
        - name: http
          containerPort: 6001
          protocol: TCP
        env:
        - name: GO_TRUST_EXTERNAL_URL
          value: "https://pdp.example.com"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: certs
          mountPath: /config
          readOnly: true
      volumes:
      - name: certs
        configMap:
          name: go-trust-certs

---
apiVersion: v1
kind: Service
metadata:
  name: go-trust
  namespace: go-trust
  labels:
    app: go-trust
spec:
  type: ClusterIP
  ports:
  - port: 6001
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: go-trust

---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-trust
  namespace: go-trust
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pdp.example.com
    secretName: go-trust-tls
  rules:
  - host: pdp.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: go-trust
            port:
              number: 6001

---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: go-trust
  namespace: go-trust
  labels:
    app: go-trust
spec:
  selector:
    matchLabels:
      app: go-trust
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
