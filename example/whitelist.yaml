# Example whitelist configuration for go-trust
#
# This file configures which issuers and verifiers are trusted.
# For more complex trust management, consider using OpenID Federation,
# ETSI Trust Lists, or other registry implementations.
#
# SECURITY WARNING: WhitelistRegistry provides URL-based trust only.
# It does NOT verify cryptographic signatures. For cryptographic trust,
# use ETSI TSL, OpenID Federation, or DID registries.
#
# The registry will automatically reload this file when it changes
# if file watching is enabled.

# Trusted credential issuers (PID providers, mdoc issuers)
issuers:
  - https://pid-provider.example.com
  - https://issuer.example.org
  # Wildcard: trust all issuers from a domain (use cautiously!)
  - https://trusted-domain.example.com/*

# Trusted verifiers (relying parties)
verifiers:
  - https://verifier.example.com
  - https://rp.example.org

# Generic trusted subjects (matches any role)
# Use this for subjects that should be trusted regardless of whether
# they act as issuer or verifier
trusted_subjects:
  - https://trusted-any-role.example.com

# Examples of wildcard patterns:
#
# Prefix match (recommended for trusting subdomains/paths):
#   - https://example.com/*         # Matches https://example.com/anything
#   - https://*.example.com         # Note: this is NOT a subdomain wildcard!
#                                   # It matches the literal "*.example.com"
#
# Global wildcard (DANGEROUS - trust everything):
#   - "*"                           # Trust ALL subjects for this role
