# Go-Trust Docker Compose Example
#
# This example shows how to run go-trust with Docker Compose.
# The certificate bundle is expected to be pre-generated by tsl-tool.

version: '3.8'

services:
  go-trust:
    image: sirosfoundation/go-trust:latest
    container_name: go-trust
    restart: unless-stopped
    ports:
      - "6001:6001"
    environment:
      - GT_HOST=0.0.0.0
      - GT_PORT=6001
      - GT_LOG_LEVEL=info
      - GT_LOG_FORMAT=json
    volumes:
      # Mount the certificate bundle (pre-generated by tsl-tool)
      - ./trusted-certs.pem:/etc/go-trust/trusted-certs.pem:ro
    command:
      - --etsi-cert-bundle=/etc/go-trust/trusted-certs.pem
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - go-trust
