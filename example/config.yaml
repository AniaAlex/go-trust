# Go-Trust Configuration Example
#
# This file documents all available configuration options.
# Use with: gt --config config.yaml
#
# Configuration file supports:
#   - server: host, port, external_url
#   - logging: level, format
#   - registries: etsi, whitelist, always_trusted, never_trusted
#
# CLI flags override config file values when both are specified.
# Additional CLI registry options: --registry, --whitelist, --whitelist-watch

# =============================================================================
# Server Configuration
# =============================================================================
server:
  # Host to listen on (default: 127.0.0.1)
  host: "0.0.0.0"

  # Port to listen on (default: 6001)
  port: "6001"

  # External URL for PDP discovery (optional)
  # Set this when running behind a reverse proxy or load balancer
  # Used in .well-known/authzen-configuration response
  external_url: "https://pdp.example.com"

  # TLS configuration (optional)
  tls:
    enabled: false
    cert_file: "/etc/go-trust/tls/server.crt"
    key_file: "/etc/go-trust/tls/server.key"

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  # Log level: debug, info, warn, error (default: info)
  level: "info"

  # Log format: text or json (default: text)
  # Use json for production/structured logging
  format: "json"

  # Output: stdout, stderr, or file path (default: stdout)
  output: "stdout"

# =============================================================================
# Security Configuration
# =============================================================================
security:
  # Rate limiting (requests per second per IP)
  # Set to 0 to disable
  rate_limit_rps: 100

  # CORS configuration
  enable_cors: true
  allowed_origins:
    - "https://example.com"
    - "https://*.example.com"

# =============================================================================
# Registry Configuration
# =============================================================================
# Configure one or more trust registries. The registry manager queries registries
# in order and uses the first match (FirstMatch strategy).

registries:
  # ---------------------------------------------------------------------------
  # ETSI TSL Registry (X.509 certificate trust)
  # ---------------------------------------------------------------------------
  # Validates X.509 certificates against ETSI TS 119612 Trust Status Lists.
  # Best for: EU eIDAS trust services, qualified certificates
  #
  # Supported resource types: x5c
  # Resolution-only: No (requires certificate to evaluate)

  etsi:
    enabled: true
    name: "ETSI-TSL"
    description: "European Trust Status List (ETSI TS 119612)"

    # Option 1: Load from pre-processed PEM bundle (recommended for production)
    # Generate with: tsl-tool from g119612
    cert_bundle: "/etc/go-trust/trusted-certs.pem"

    # Option 2: Load from local TSL XML files
    # tsl_files:
    #   - "/var/lib/tsls/eu-lotl.xml"
    #   - "/var/lib/tsls/se-tsl.xml"

    # Option 3: Fetch from URLs (only with allow_network_access: true)
    # tsl_urls:
    #   - "https://ec.europa.eu/tools/lotl/eu-lotl.xml"

    # Follow TSL references (pointers to other TSLs)
    follow_refs: false
    max_ref_depth: 3

    # Network settings
    allow_network_access: false  # Disable for production security
    fetch_timeout: "30s"
    user_agent: "Go-Trust/2.0 TSL Registry"

  # ---------------------------------------------------------------------------
  # OpenID Federation Registry (entity trust chains)
  # ---------------------------------------------------------------------------
  # Validates entities via OpenID Federation trust chains.
  # Best for: EUDI wallet ecosystem, federated identity
  #
  # Supported resource types: entity_configuration, entity_statement, jwk
  # Resolution-only: Yes (can resolve entity configurations)

  oidfed:
    enabled: true
    name: "OIDF"
    description: "OpenID Federation Trust Chain Validation"

    # Trust anchors (at least one required)
    trust_anchors:
      - entity_id: "https://federation.example.com"
        # Optional: Provide JWKS explicitly instead of fetching
        # jwks: {...}

      - entity_id: "https://dc4eu.eu"
        # Federation anchor for DC4EU ecosystem

    # Optional: Require specific trust marks
    required_trust_marks:
      - "https://dc4eu.eu/tm/wallet"
      - "https://dc4eu.eu/tm/issuer"

    # Optional: Filter by entity type
    entity_types:
      - "openid_provider"
      - "openid_relying_party"
      - "oauth_authorization_server"

    # Cache settings
    cache_ttl: "5m"        # Default: 5 minutes
    max_cache_size: 1000   # Default: 1000 entries
    max_chain_depth: 10    # Default: 10

  # ---------------------------------------------------------------------------
  # DID Web Registry (did:web method)
  # ---------------------------------------------------------------------------
  # Resolves and validates did:web identifiers.
  # Best for: Web-based decentralized identifiers
  #
  # Supported resource types: did_document, jwk, verification_method
  # Resolution-only: Yes (can resolve DID documents)

  didweb:
    enabled: true
    name: "DID-Web"
    description: "DID Web Method (did:web) Registry"

    # Request timeout
    timeout: "30s"

    # TLS verification (disable only for testing!)
    insecure_skip_verify: false

    # Allow HTTP (disable for production - did:web spec requires HTTPS)
    allow_http: false

  # ---------------------------------------------------------------------------
  # DID Web VH Registry (did:webvh method with Verifiable History)
  # ---------------------------------------------------------------------------
  # Resolves and validates did:webvh identifiers with cryptographic integrity.
  # Best for: DIDs requiring version history and pre-rotation key support
  #
  # Supported resource types: did_document, jwk, verification_method
  # Resolution-only: Yes (can resolve DID documents)

  didwebvh:
    enabled: true
    name: "DID-WebVH"
    description: "DID Web VH Method (did:webvh) Registry"

    # Request timeout
    timeout: "30s"

    # TLS verification (disable only for testing!)
    insecure_skip_verify: false

    # Allow HTTP (disable for production - spec requires HTTPS)
    allow_http: false

  # ---------------------------------------------------------------------------
  # mDOC IACA Registry (dynamic IACA validation)
  # ---------------------------------------------------------------------------
  # Validates mDOC/mDL X.509 certificate chains against IACA certificates
  # fetched dynamically from OpenID4VCI issuers.
  # Best for: Mobile driving license (mDL), mDOC credential issuance
  #
  # Supported resource types: x5c
  # Resolution-only: No (requires certificate to evaluate)

  mdociaca:
    enabled: true
    name: "mDOC-IACA"
    description: "mDOC IACA Certificate Validation"

    # Optional: Restrict to specific issuers
    # If empty, all issuers publishing valid IACAs are trusted
    issuer_allowlist:
      - "https://issuer.example.com"
      - "https://pid-issuer.eudiw.dev"

    # Cache settings
    cache_ttl: "1h"       # Default: 1 hour
    http_timeout: "30s"   # Default: 30 seconds

  # ---------------------------------------------------------------------------
  # Whitelist Registry (simple URL-based trust)
  # ---------------------------------------------------------------------------
  # Simple static whitelist for trusted URLs.
  # Best for: Testing, development, simple deployments
  #
  # Supported resource types: none (URL-based only)
  # Resolution-only: No
  # SECURITY NOTE: Does not verify signatures - use for URL trust only!

  whitelist:
    enabled: false  # Disabled by default - use proper registries in production
    name: "Whitelist"
    description: "Static URL Whitelist"

    # Option 1: Load from config file (supports file watching)
    config_file: "/etc/go-trust/whitelist.yaml"
    watch_file: true  # Auto-reload on changes

    # Option 2: Configure inline
    # issuers:
    #   - "https://pid-issuer.example.com"
    #   - "https://issuer.example.org"
    #   - "https://trusted-domain.com/*"  # Wildcard prefix match
    #
    # verifiers:
    #   - "https://verifier.example.com"
    #   - "https://rp.example.org"
    #
    # trusted_subjects:
    #   - "https://any-role.example.com"  # Matches any role

  # ---------------------------------------------------------------------------
  # Static Test Registries
  # ---------------------------------------------------------------------------
  # Simple registries for testing and development.
  # DO NOT USE IN PRODUCTION!

  # Always returns decision=true
  # always_trusted:
  #   enabled: false

  # Always returns decision=false
  # never_trusted:
  #   enabled: false

  # Validates X.509 against OS system CA bundle
  # system_cert_pool:
  #   enabled: false

# =============================================================================
# Policy Configuration
# =============================================================================
# Policies define trust requirements based on action.name in requests.
# They map application-level roles (issuer, verifier) to registry-specific
# constraints (ETSI service types, trust marks, DID domains, etc.)

policies:
  # Default policy used when action.name is not specified
  default_policy: credential-verifier

  policies:
    # ---------------------------------------------------------------------------
    # Credential Issuer Policy
    # ---------------------------------------------------------------------------
    # For entities issuing credentials (PID providers, attestation issuers)
    credential-issuer:
      description: "Trust requirements for credential issuers"

      # ETSI service types for electronic signatures and seals
      etsi:
        service_types:
          # Qualified Electronic Signature (QES) for natural persons
          - "http://uri.etsi.org/TrstSvc/Svctype/QCert"
          # Qualified Electronic Seal for organizations
          - "http://uri.etsi.org/TrstSvc/Svctype/QCertForESeal"
          # Time stamping services
          - "http://uri.etsi.org/TrstSvc/Svctype/TSA/QTST"
        service_statuses:
          - "http://uri.etsi.org/TrstSvc/TrustedList/Svcstatus/granted"

      # OpenID Federation constraints
      oidfed:
        entity_types:
          - "openid_credential_issuer"
        required_trust_marks:
          - "https://dc4eu.eu/tm/issuer"

      # DID constraints for did:web and did:webvh issuers
      did:
        allowed_domains:
          - "*.eudiw.dev"
          - "*.example.com"
        require_verifiable_history: true  # Prefer did:webvh

    # ---------------------------------------------------------------------------
    # Credential Verifier Policy
    # ---------------------------------------------------------------------------
    # For entities verifying credentials (relying parties)
    credential-verifier:
      description: "Trust requirements for credential verifiers"

      etsi:
        service_types:
          # Web authentication services
          - "http://uri.etsi.org/TrstSvc/Svctype/QCertForESig"
          # Remote QES services for verifiers
          - "http://uri.etsi.org/TrstSvc/Svctype/QCert"
        service_statuses:
          - "http://uri.etsi.org/TrstSvc/TrustedList/Svcstatus/granted"

      oidfed:
        entity_types:
          - "openid_relying_party"
        required_trust_marks:
          - "https://dc4eu.eu/tm/verifier"

      did:
        allowed_domains:
          - "*.eudiw.dev"
          - "*.example.com"

    # ---------------------------------------------------------------------------
    # Wallet Provider Policy
    # ---------------------------------------------------------------------------
    # For wallet provider attestation validation
    wallet-provider:
      description: "Trust requirements for wallet providers"

      oidfed:
        entity_types:
          - "wallet_provider"
        required_trust_marks:
          - "https://dc4eu.eu/tm/wallet"

      # Only use OpenID Federation for wallet attestation
      registries:
        - "oidfed-registry"

    # ---------------------------------------------------------------------------
    # mDL Issuer Policy
    # ---------------------------------------------------------------------------
    # For mobile driving license issuers
    mdl-issuer:
      description: "Trust requirements for mDL/mDOC issuers"

      mdociaca:
        issuer_allowlist:
          - "https://pid-issuer.eudiw.dev"
          - "https://mdl-issuer.example.com"
        require_iaca_endpoint: true

      # Only use mDOC IACA registry
      registries:
        - "mdoc-iaca"

    # ---------------------------------------------------------------------------
    # Generic Trust Policy
    # ---------------------------------------------------------------------------
    # Fallback policy with minimal constraints
    trust:
      description: "Generic trust evaluation"
      constraints:
        require_key_binding: true
        allowed_key_types:
          - "x5c"
          - "jwk"
