# DID Web Registry Example Configuration
#
# This example shows how to configure go-trust to use the did:web method
# for resolving decentralized identifiers via HTTPS.
#
# See: https://w3c-ccg.github.io/did-method-web/

# Example 1: Simple did:web validation
# This validates that a JWK belongs to a DID document hosted at a domain

# AuthZEN evaluation request:
# POST /evaluation
# {
#   "subject": {
#     "type": "key",
#     "id": "did:web:example.com"
#   },
#   "resource": {
#     "type": "jwk",
#     "id": "did:web:example.com",
#     "key": [{
#       "kty": "OKP",
#       "crv": "Ed25519",
#       "x": "11qYAYKxCrfVS_7TyWQHOg7hcvPapiMlrwIaaPcHURo"
#     }]
#   },
#   "action": {
#     "name": "authenticate"
#   }
# }

# The registry will:
# 1. Parse did:web:example.com
# 2. Resolve to https://example.com/.well-known/did.json
# 3. Fetch the DID document over HTTPS
# 4. Verify the JWK exists in the verificationMethod array
# 5. Return decision: true if matched

# Example 2: DID with path
# did:web:example.com:users:alice
# Resolves to: https://example.com/users/alice/did.json

# Example 3: DID with port
# did:web:example.com%3A3000
# Resolves to: https://example.com:3000/.well-known/did.json

# Example 4: DID with port and path
# did:web:example.com%3A3000:users:bob
# Resolves to: https://example.com:3000/users/bob/did.json

# Example DID Document hosted at https://example.com/.well-known/did.json
# {
#   "@context": [
#     "https://www.w3.org/ns/did/v1",
#     "https://w3id.org/security/suites/jws-2020/v1"
#   ],
#   "id": "did:web:example.com",
#   "verificationMethod": [
#     {
#       "id": "did:web:example.com#key-1",
#       "type": "JsonWebKey2020",
#       "controller": "did:web:example.com",
#       "publicKeyJwk": {
#         "kty": "OKP",
#         "crv": "Ed25519",
#         "x": "11qYAYKxCrfVS_7TyWQHOg7hcvPapiMlrwIaaPcHURo"
#       }
#     },
#     {
#       "id": "did:web:example.com#key-2",
#       "type": "JsonWebKey2020",
#       "controller": "did:web:example.com",
#       "publicKeyJwk": {
#         "kty": "EC",
#         "crv": "P-256",
#         "x": "38M1FDts7Oea7urmseiugGW7tWc3mLpJh6rKe7xINZ8",
#         "y": "nDQW6XZ7b_u2Sy9slofYLlG03sOEoug3I0aAPQ0exs4"
#       }
#     }
#   ],
#   "authentication": [
#     "did:web:example.com#key-1"
#   ],
#   "assertionMethod": [
#     "did:web:example.com#key-1",
#     "did:web:example.com#key-2"
#   ]
# }

# Security Notes:
# - TLS 1.2+ is enforced with strong cipher suites
# - Certificate verification is enabled by default
# - DNS over HTTPS (DoH) is recommended to prevent DNS tracking
# - The DID document ID must match the requested DID
# - CORS headers should be set on the DID document endpoint
