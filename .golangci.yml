# golangci-lint v2 configuration for go-trust
# Run with: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

formatters:
  enable:
    - gofmt          # Check formatting
    - goimports      # Check imports

linters:
  enable:
    - errcheck       # Check for unchecked errors
    - govet          # Reports suspicious constructs
    - ineffassign    # Detects unused variable assignments
    - staticcheck    # Comprehensive static analysis (includes gosimple)
    - unused         # Checks for unused code
    - gocritic       # Opinionated linter
    - misspell       # Check spelling
    - unconvert      # Remove unnecessary conversions
    - unparam        # Find unused function parameters
    - gosec          # Security checks
  disable:
    - exhaustive     # Too noisy for switch statements

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment  # Too noisy
  gosec:
    excludes:
      - G107  # URL provided to HTTP request as taint input (false positive for internal URLs)
      - G304  # File inclusion via variable (necessary for config loading)
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy
  staticcheck:
    checks: ["all"]
  goimports:
    local-prefixes: github.com/sirosfoundation/go-trust

issues:
  exclude-rules:
    # Allow fmt.Print in tests and examples
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: example/
      linters:
        - errcheck
        - gosec
    # Allow TODO/FIXME comments
    - source: "TODO|FIXME"
      linters:
        - godox
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    colored-line-number: {}
  print-linter-name: true
  sort-results: true
