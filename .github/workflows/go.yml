name: Go

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxslt1-dev xsltproc bc

    - name: Verify dependencies
      # Note: 'vc' module uses non-standard path ('module vc' instead of 'module github.com/SUNET/vc')
      # This causes go mod verify to fail with "missing ziphash". Build still works via replace directive.
      # TODO: Fix upstream in SUNET/vc to use proper module path
      run: go mod verify || echo "::warning file=go.mod::go mod verify failed - likely due to vc module with non-standard path"

    - name: Build
      run: go build -v ./...

    - name: Run tests with coverage
      env:
        SKIP_NETWORK_TESTS: "1"
      run: go test -v -race -timeout 10m -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.txt
        fail_ci_if_error: false

    - name: Generate coverage badge
      if: github.ref == 'refs/heads/main'
      run: |
        # Calculate coverage percentage from coverage.txt
        COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
        echo "Coverage: ${COVERAGE}%"

        # Generate coverage badge SVG
        mkdir -p .badges/main
        if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
          COLOR="brightgreen"
        elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
          COLOR="green"
        elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
          COLOR="yellowgreen"
        elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then
          COLOR="yellow"
        elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
          COLOR="orange"
        else
          COLOR="red"
        fi

        # Use shields.io to generate the badge
        curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}.svg" > .badges/main/coverage.svg
        echo "Generated coverage badge: ${COVERAGE}% (${COLOR})"
        ls -la .badges/main/coverage.svg

    - name: Commit badges
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Checking for badge files..."
        ls -la .badges/main/ || { echo "Badge directory not found"; exit 0; }

        if [ ! -f .badges/main/coverage.svg ]; then
          echo "Warning: coverage.svg not found, skipping commit"
          exit 0
        fi

        echo "Coverage badge exists, proceeding with commit"

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Save generated badges to temp location BEFORE any git operations
        mkdir -p /tmp/badges
        cp -v .badges/main/*.svg /tmp/badges/
        echo "Badges saved to /tmp:"
        ls -la /tmp/badges/

        # Clean up any changes (including README.md modifications by badge action)
        git checkout -- .
        git clean -fd

        # Verify badges are still in /tmp after clean
        echo "Verifying badges in /tmp after git clean:"
        ls -la /tmp/badges/

        # Fetch or create badges branch and checkout directly from remote
        git fetch origin badges 2>/dev/null || true

        # Checkout badges branch from origin, creating/resetting local branch
        # This ensures we get the exact state from origin/badges
        git checkout -B badges origin/badges 2>/dev/null || git checkout -b badges

        echo "Files in .badges/main before copy:"
        ls -la .badges/main/ || echo "Directory doesn't exist"

        # Copy the generated badge files from temp
        mkdir -p .badges/main
        cp -v /tmp/badges/*.svg .badges/main/
        echo "Badges copied to badges branch:"
        ls -la .badges/main/

        echo "Git status after copy:"
        git status --short

        # Force add all badge files (both new and modified)
        git add -f .badges/main/*.svg
        echo "Git status after add:"
        git status --short
        echo "Git diff staged:"
        git diff --staged --name-status

        # Commit and push (always, even if no changes - files might have same content)
        git commit -m "chore: Update badges [skip ci]" || echo "Nothing to commit"
        git push origin badges

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.10.0
        args: --timeout=5m --tests=false
        verify: false
